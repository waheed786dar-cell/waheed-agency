<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Waheed Agency</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/images/icons/favicon.png">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('wa_theme_preference');
        var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <main style="min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;">
    <h1 style="font-size:6rem;color:var(--color-primary);margin-bottom:1rem;">404</h1>
    <h2 style="margin-bottom:1rem;">Page not found</h2>
    <p class="text-muted mb-8" style="max-width:400px;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary">Back to Home</a>
  </main>
  <script src="/js/config/constants.js" defer></script>
  <script src="/js/utils/helpers.js" defer></script>
  <script src="/js/modules/theme-toggle.js" defer></script>
</body>
</html>
